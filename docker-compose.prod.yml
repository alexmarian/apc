services:

  backend:
    image: apc-backend:${IMAGE_TAG:-latest}
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data:z
    env_file: .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - default

  admin:
    image: apc-admin:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP: admin
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - caddy-proxy
      - default

  member:
    image: apc-member:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP: member
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - caddy-proxy
      - default

networks:
  caddy-proxy:
    external: true
